services:
  backend:
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      ENVIRONMENT: development
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://portafolio:portafolio@db:3306/portafolio_db}
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: DEBUG
      DATABASE_ECHO: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-dev}

  frontend:
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
