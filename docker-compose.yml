services:
  db:
    image: mysql:8.4
    container_name: portafolio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: portafolio_db
      MYSQL_USER: portafolio
      MYSQL_PASSWORD: portafolio
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: portafolio_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://portafolio:portafolio@db:3306/portafolio_db
      HOST: 0.0.0.0
      PORT: 8000
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      AUTH_SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: portafolio_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
