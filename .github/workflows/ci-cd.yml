name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
      - develop
      - feature/**
      - fix/**

jobs:
  set-image-name-lower:
    runs-on: ubuntu-latest
    outputs:
      image_name_lower: ${{ steps.set-lower.outputs.image_name_lower }}
    steps:
      - name: Set IMAGE_NAME_LOWER
        id: set-lower
        run: |
          echo "image_name_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
  # ============================================================================
  # ETAPA 1: Validación de código y linting
  # ============================================================================
  validate:
    runs-on: ubuntu-latest
    name: Validate Code
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check import order (isort)
        run: isort backend --check-only --diff
        continue-on-error: true

      - name: Check code formatting (black)
        run: black backend --check --diff
        continue-on-error: true

      - name: Lint with flake8
        run: flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint 2>/dev/null || echo "No lint script defined"
        continue-on-error: true

  # ============================================================================
  # ETAPA 2: Build de imágenes Docker
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [validate, set-image-name-lower]
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.set-image-name-lower.outputs.image_name_lower }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.set-image-name-lower.outputs.image_name_lower }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.set-image-name-lower.outputs.image_name_lower }}/backend:buildcache,mode=max

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.set-image-name-lower.outputs.image_name_lower }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=${{ env.VITE_API_URL }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.set-image-name-lower.outputs.image_name_lower }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.set-image-name-lower.outputs.image_name_lower }}/frontend:buildcache,mode=max

  # ============================================================================
  # ETAPA 3: Tests
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: build
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: portafolio_test
          MYSQL_USER: portafolio
          MYSQL_PASSWORD: portafolio
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-asyncio

      - name: Run backend tests
        env:
          DATABASE_URL: mysql+aiomysql://portafolio:portafolio@localhost:3306/portafolio_test
          APP_ENV: development
        run: |
          pytest backend/tests -v 2>/dev/null || echo "No hay tests aún"
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test 2>/dev/null || echo "No hay tests configurados"
        continue-on-error: true

  # ============================================================================
  # ETAPA 4: Deploy a Staging (rama develop)
  # ============================================================================
  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: test
    environment:
      name: staging
      url: https://staging.tu-dominio.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /app/portafolio
            git pull origin develop
            cp .env.staging.example .env
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
            docker compose logs -f --tail=50
          EOF

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Staging deployment successful!**\n\n🔗 [Staging URL](https://staging.tu-dominio.com)'
            })

  # ============================================================================
  # ETAPA 5: Deploy a Producción (rama main)
  # ============================================================================
  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: test
    environment:
      name: production
      url: https://tu-dominio.com
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Deployment from GitHub Actions',
              auto_merge: false,
              required_contexts: []
            });
            return deployment.data.id;

      - name: Deploy to production server
        env:
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa $DEPLOY_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /app/portafolio
            git pull origin main
            cp .env.production.example .env
            # Mantener secretos existentes (si existen)
            [ -f .env.prod.secrets ] && cat .env.prod.secrets >> .env
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose logs -f --tail=50
          EOF

      - name: Update deployment status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              description: 'Production deployment completed',
              environment_url: 'https://tu-dominio.com'
            });

      - name: Notify Slack (optional)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Production deployment successful!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment* ✅\n*Repository:* ${{ github.repository }}\n*Branch:* main\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ============================================================================
  # ETAPA 6: Resultado final
  # ============================================================================
  notify:
    if: always()
    runs-on: ubuntu-latest
    name: Notify Results
    needs: [validate, build, test]
    steps:
      - name: Check job results
        run: |
          echo "Validate: ${{ needs.validate.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          
          if [[ "${{ needs.validate.result }}" == "failure" ]]; then
            echo "❌ Validation failed"
            exit 1
          fi
          
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "⚠️ Tests failed (non-blocking)"
          fi
          
          echo "✅ CI/CD Pipeline completed"
